{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Upload Waste Image</h3>
            </div>
            <div class="card-body">
                <form id="uploadForm" method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="file" class="form-control" name="image" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Classify</button>
                </form>
                
                <!-- Results Section -->
                {% if prediction %}
                <div class="mt-4 p-3 border rounded">
                    <h4>Result:</h4>
                    <p class="fs-5">This is <strong>{{ prediction }}</strong> ({{ confidence }}% confidence)</p>
                    <div class="mt-3">
                        <h5>Disposal Guide:</h5>
                        <p>{{ disposal_guide }}</p>
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
